<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <title>Robot Kontrol Paneli</title>
    <style>
        body { background: #111; color: white; display: flex; flex-direction: column; align-items: center; font-family: sans-serif; }
        .box { width: 90%; max-width: 300px; padding: 15px; margin-top: 20px; border: 1px solid #444; border-radius: 10px; }
        button { width: 100%; padding: 15px; margin: 5px 0; background: #007bff; border: none; border-radius: 5px; color: white; font-weight: bold; }
        #console { width: 90%; max-width: 300px; height: 150px; background: #000; color: #0f0; padding: 10px; margin-top: 20px; font-size: 12px; overflow-y: scroll; border: 1px solid #333; }
    </style>
</head>
<body>

    <div class="box">
        <input type="text" id="ip" placeholder="Robot IP (örn: 192.168.1.50)" style="width: 100%;">
        <button onclick="move('forward')">İLERİ GİT</button>
        <button onclick="move('backward')">GERİ GİT</button>
        <button onclick="move('stop')" style="background: #dc3545;">DUR</button>
    </div>

    <div id="console">Loglar buraya düşecek...</div>

    <script>
        function log(msg) { 
            document.getElementById('console').innerHTML += "> " + msg + "<br>"; 
            document.getElementById('console').scrollTop = 9999;
        }

        // --- EN KRİTİK KISIM: RESİM HİLESİ (IMAGE HACK) ---
        // Bu yöntem, tarayıcıların "Mixed Content" engelini by-pass eder.
        function move(cmd) {
            let ip = document.getElementById('ip').value.trim();
            if (!ip) { log("Önce IP gir!"); return; }
            if (!ip.startsWith('http://')) ip = 'http://' + ip;
            
            let url = `${ip}/${cmd}?t=${new Date().getTime()}`;
            let img = new Image();
            
            img.onload = () => log("Başarılı: " + cmd);
            img.onerror = () => log("İstek gönderildi (resim yüklenemedi): " + cmd);
            
            img.src = url;
            log("Gönderiliyor: " + cmd);
        }
    </script>
</body>
</html>
