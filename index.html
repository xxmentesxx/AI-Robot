<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="theme-color" content="#050810">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>Robot Beyni</title>
<style>
/* ============ 1. VARIABLES & RESET ============ */
:root{
  --bg:#050810;
  --bg2:#0a1020;
  --card:rgba(255,255,255,.04);
  --card2:rgba(255,255,255,.07);
  --border:rgba(255,255,255,.08);
  --cyan:#22d3ee;
  --cyan2:#67e8f9;
  --cyan-g:rgba(34,211,238,.35);
  --green:#34d399;
  --red:#fb5e6b;
  --amber:#fbbf24;
  --pink:#fb7185;
  --text:#e2eaf4;
  --muted:#6b7f96;
  --r:16px;
  --safe-t:env(safe-area-inset-top,0px);
  --safe-b:env(safe-area-inset-bottom,0px);
  --px:0px; --py:0px;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
html,body{height:100%;overflow:hidden;}
body{background:var(--bg);color:var(--text);
  font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,sans-serif;
  height:100dvh;user-select:none;}

/* ============ 2. SCREEN SYSTEM ============ */
.screen{display:none;flex-direction:column;height:100dvh;width:100%;
  padding-top:var(--safe-t);padding-bottom:var(--safe-b);}
.screen.active{display:flex;animation:fadeIn .4s ease;}
@keyframes fadeIn{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:none}}

/* ============ 3. COMMON UI ============ */
.brand{display:flex;align-items:center;gap:12px;}
.brand .logo{width:42px;height:42px;border-radius:12px;display:grid;place-items:center;
  background:linear-gradient(145deg,#22d3ee,#0e7490);box-shadow:0 4px 18px var(--cyan-g);font-size:22px;}
.brand h1{font-size:17px;letter-spacing:.3px;}
.brand p{font-size:10px;color:var(--muted);letter-spacing:1.5px;text-transform:uppercase;}
.card{background:var(--card);border:1px solid var(--border);border-radius:var(--r);
  backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px);padding:16px;}
.dot{width:9px;height:9px;border-radius:50%;background:var(--muted);display:inline-block;
  box-shadow:0 0 0 0 transparent;transition:.3s;flex-shrink:0;}
.dot.on{background:var(--green);box-shadow:0 0 10px var(--green);}
.dot.warn{background:var(--amber);box-shadow:0 0 10px var(--amber);}
.dot.off{background:var(--red);box-shadow:0 0 10px var(--red);}
.btn{border:none;border-radius:14px;font-weight:700;cursor:pointer;color:#04181d;
  background:linear-gradient(145deg,#2ee6ff,#0891b2);font-size:15px;padding:14px;
  box-shadow:0 8px 26px var(--cyan-g);transition:transform .1s,filter .15s;width:100%;}
.btn:active{transform:translateY(2px) scale(.99);filter:brightness(1.05);}
.ble-btn{color:#fff;background:linear-gradient(145deg,#3b82f6,#1d4ed8);box-shadow:0 8px 26px rgba(59,130,246,.3);}
.ble-btn.on{background:linear-gradient(145deg,#34d399,#059669);box-shadow:0 8px 26px rgba(52,211,153,.3);}
.icon-btn{width:42px;height:42px;border-radius:12px;display:grid;place-items:center;font-size:17px;
  background:var(--card2);border:1px solid var(--border);color:var(--text);cursor:pointer;}
.icon-btn:active{transform:scale(.92);}
.field{position:relative;margin-top:12px;}
.field label{position:absolute;top:8px;left:14px;font-size:9px;letter-spacing:1px;
  text-transform:uppercase;color:var(--muted);pointer-events:none;}
.field input{width:100%;padding:24px 14px 10px;background:rgba(0,0,0,.3);
  border:1px solid var(--border);border-radius:12px;color:var(--text);font-size:14px;outline:none;
  transition:border-color .2s,box-shadow .2s;}
.field input:focus{border-color:var(--cyan);box-shadow:0 0 0 3px rgba(34,211,238,.15);}
.section-label{font-size:10px;letter-spacing:1.5px;text-transform:uppercase;color:var(--muted);
  margin-bottom:6px;display:flex;align-items:center;gap:6px;}

/* ============ 4. CONTROL PANEL ============ */
#ctrlScreen{overflow-y:auto;}
.ctrl-wrap{max-width:440px;margin:0 auto;padding:18px 16px 100px;display:flex;flex-direction:column;gap:14px;}
.ctrl-header{display:flex;align-items:center;justify-content:space-between;}
.conn-row{display:flex;align-items:center;gap:8px;font-size:12px;color:var(--muted);margin-bottom:12px;}
/* Camera preview */
.cam-box{position:relative;width:100%;aspect-ratio:16/9;border-radius:12px;overflow:hidden;
  background:#04070c;border:1px solid var(--border);}
.cam-box video{width:100%;height:100%;object-fit:cover;display:block;}
.cam-box.off video{opacity:0;}
.cam-box .cam-off{position:absolute;inset:0;display:none;align-items:center;justify-content:center;
  color:var(--muted);font-size:13px;gap:8px;flex-direction:column;}
.cam-box.off .cam-off{display:flex;}
.cam-box .cam-tag{position:absolute;top:8px;left:8px;font-size:9px;letter-spacing:1px;text-transform:uppercase;
  background:rgba(0,0,0,.5);color:var(--cyan);padding:4px 8px;border-radius:7px;display:flex;align-items:center;gap:5px;}
.cam-box .cam-btns{position:absolute;bottom:8px;right:8px;display:flex;gap:6px;}
.cam-box .cam-btns button{width:36px;height:36px;border-radius:10px;border:1px solid var(--border);
  background:rgba(0,0,0,.5);color:var(--text);font-size:15px;cursor:pointer;backdrop-filter:blur(4px);}
/* Mic test */
.mic-row{display:flex;align-items:center;gap:10px;}
.mic-row button{flex-shrink:0;}
.vu-track{flex:1;height:8px;border-radius:4px;background:rgba(255,255,255,.06);overflow:hidden;}
.vu-fill{height:100%;width:0%;border-radius:4px;background:linear-gradient(90deg,var(--cyan),var(--green));
  transition:width 60ms linear;}
.mic-label{font-size:11px;color:var(--muted);min-width:46px;text-align:right;}
/* D-Pad */
.dpad{display:grid;grid-template-columns:repeat(3,1fr);grid-template-rows:repeat(3,1fr);
  gap:10px;width:min(72vw,280px);aspect-ratio:1;margin:0 auto;}
.pad{border:1px solid var(--border);border-radius:16px;background:var(--card2);color:var(--cyan);
  font-size:12px;font-weight:700;display:flex;flex-direction:column;align-items:center;justify-content:center;
  gap:2px;cursor:pointer;transition:transform .1s,background .12s,box-shadow .12s;}
.pad .gl{font-size:24px;line-height:1;}
.pad:active{transform:scale(.92);background:rgba(34,211,238,.15);box-shadow:0 0 18px var(--cyan-g);color:#eafdff;}
.pad.up{grid-area:1/2;}.pad.lt{grid-area:2/1;}.pad.rt{grid-area:2/3;}.pad.dn{grid-area:3/2;}
.pad.st{grid-area:2/2;color:var(--red);border-color:rgba(251,94,107,.3);}
.pad.st:active{background:rgba(251,94,107,.15);box-shadow:0 0 18px rgba(251,94,107,.4);}
.move-status{text-align:center;font-size:11px;color:var(--muted);min-height:14px;margin-top:4px;}
.btn-ai{margin-top:6px;font-size:17px;padding:18px;
  background:linear-gradient(145deg,#22d3ee,#6366f1);box-shadow:0 8px 30px rgba(34,211,238,.3);}

/* ============ 5. AI MODE ============ */
.ai-bg{position:fixed;inset:0;
  background:radial-gradient(ellipse 120% 90% at 50% 42%,#0c1a30,var(--bg) 68%);z-index:0;}
.face{position:relative;z-index:1;flex:1;display:flex;align-items:center;justify-content:center;}
.eyes-wrap{display:flex;align-items:center;gap:clamp(18px,7vw,55px);margin-top:-4vh;}

/* ============ 6. EYE SYSTEM ============ */
.eye{
  position:relative;
  --ew:min(36vw,50vh,220px);
  width:var(--ew); height:calc(var(--ew)*1.32);
  border-radius:44%;overflow:hidden;
  box-shadow:
    0 0 18px rgba(34,211,238,.35),
    0 0 45px rgba(34,211,238,.18),
    0 0 90px rgba(34,211,238,.08),
    0 0 140px rgba(34,211,238,.04);
  animation:neonPulse 4s ease-in-out infinite;
  transition:transform .25s ease, box-shadow .5s ease, border-radius .35s ease;
}
@media(orientation:landscape){
  .eye{--ew:min(22vw,55vh,200px);}
  .eyes-wrap{gap:clamp(24px,8vw,70px);}
}
@keyframes neonPulse{0%,100%{filter:brightness(1)}50%{filter:brightness(1.06)}}

.sclera{position:absolute;inset:0;
  background:radial-gradient(ellipse 90% 80% at 50% 42%,#e4fbff 0%,#b0ecf5 25%,#3dd8f0 50%,#0e8da5 78%,#065064 100%);}

.iris-group{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;
  transform:translate(var(--px),var(--py));transition:transform .22s cubic-bezier(.25,.46,.45,.94);}
.iris{width:72%;height:55%;border-radius:50%;position:relative;
  background:radial-gradient(circle at 42% 38%,#a5f3fc,#22d3ee 32%,#0891b2 58%,#0e7490 80%,#064e5e);
  box-shadow:0 0 16px rgba(34,211,238,.45),inset 0 0 12px rgba(0,20,40,.3);
  transition:transform .3s ease, width .3s ease, height .3s ease;}
.pupil{position:absolute;top:50%;left:50%;width:42%;height:42%;border-radius:50%;
  transform:translate(-50%,-50%);
  background:radial-gradient(circle at 44% 38%,#151530,#050510 65%);
  box-shadow:0 0 8px rgba(0,0,0,.5);
  transition:width .3s ease, height .3s ease;}

/* Highlights — fixed relative to eye, not iris */
.shine{position:absolute;z-index:3;pointer-events:none;}
.shine-lg{top:18%;left:22%;width:22%;height:18%;border-radius:50%;
  background:rgba(255,255,255,.82);filter:blur(1.5px);
  transform:rotate(-18deg) scaleX(1.3);}
.shine-sm{bottom:28%;right:24%;width:10%;height:8%;border-radius:50%;
  background:rgba(255,255,255,.45);filter:blur(1px);}

/* Icon layer */
.eye-icon{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;
  font-size:calc(var(--ew)*.7);line-height:1;z-index:4;
  opacity:0;transform:scale(.4) rotate(-15deg);
  transition:opacity .28s ease,transform .32s cubic-bezier(.34,1.56,.64,1);pointer-events:none;}
.eye.icon-mode .eye-icon{opacity:1;transform:scale(1) rotate(0deg);}
.eye.icon-mode .iris-group{opacity:0;transform:scale(.3);transition:opacity .2s,transform .2s;}
.eye.icon-mode .shine{opacity:0;transition:opacity .15s;}

/* Eyelids */
.lid{position:absolute;left:-2%;right:-2%;z-index:5;background:var(--bg);
  transition:height .22s ease,border-radius .22s ease,transform .22s ease;}
.lid-top{top:-1%;height:0;}
.lid-btm{bottom:-1%;height:0;}

/* Blink */
.eye.blink .lid-top{height:102%!important;transition:height .07s ease-in!important;}

/* ============ 7. EYE EXPRESSIONS ============ */
/* talking — controlled by JS scaleY */
.face.expr-listening .eye{transform:scale(1.04);}
.face.expr-listening .iris{box-shadow:0 0 22px rgba(34,211,238,.6),inset 0 0 12px rgba(0,20,40,.3);}

.face.expr-happy .lid-btm{height:38%;border-radius:60% 60% 0 0;}
.face.expr-happy .eye{box-shadow:0 0 22px rgba(52,211,153,.35),0 0 50px rgba(52,211,153,.15),0 0 100px rgba(52,211,153,.06);}

.face.expr-surprised .eye{transform:scale(1.1);border-radius:48%;}
.face.expr-surprised .pupil{width:28%;height:28%;}

.face.expr-angry #eyeL .lid-top{height:32%;transform:skewY(-10deg);}
.face.expr-angry #eyeR .lid-top{height:32%;transform:skewY(10deg);}
.face.expr-angry .eye{box-shadow:0 0 22px rgba(251,94,107,.35),0 0 50px rgba(251,94,107,.15),0 0 100px rgba(251,94,107,.06);}
.face.expr-angry .iris{background:radial-gradient(circle at 42% 38%,#fca5a5,#fb7185 32%,#e11d48 58%,#9f1239 80%);}

.face.expr-thinking .iris-group{transform:translate(8px,-12px)!important;}
.face.expr-thinking .lid-top{height:18%;}
.face.expr-thinking .eye{animation:thinkBob 2.5s ease-in-out infinite;}
@keyframes thinkBob{0%,100%{transform:translateY(0)}50%{transform:translateY(-6px)}}

.face.expr-sleepy .lid-top{height:52%;transition:height .8s ease;}
.face.expr-sleepy .eye{animation:none;filter:brightness(.85);}

.face.expr-wink #eyeL .lid-top{height:102%;}
.face.expr-wink #eyeR .lid-btm{height:30%;border-radius:60% 60% 0 0;}

.face.expr-love .eye{box-shadow:0 0 22px rgba(251,113,133,.4),0 0 55px rgba(251,113,133,.2),0 0 100px rgba(251,113,133,.08);}
.face.expr-love .iris{background:radial-gradient(circle at 42% 38%,#fda4af,#fb7185 32%,#e11d48 58%,#9f1239 80%);}
.face.expr-love .sclera{background:radial-gradient(ellipse 90% 80% at 50% 42%,#fff1f2,#fecdd3 25%,#fda4af 50%,#e11d48 78%,#881337 100%);}

.face.expr-dead .iris-group,.face.expr-dead .shine{opacity:0;transition:opacity .15s;}
.face.expr-dead .eye-icon{opacity:1;transform:scale(1);font-size:calc(var(--ew)*.55);}
.face.expr-dead .eye{animation:none;filter:brightness(.6) saturate(.3);}

/* ============ 8. TRANSCRIPT OVERLAY ============ */
.transcript{position:fixed;bottom:0;left:0;right:0;z-index:10;
  padding:40px 20px calc(14px + var(--safe-b));
  background:linear-gradient(to top,rgba(5,8,16,.92) 0%,rgba(5,8,16,.6) 55%,transparent 100%);
  display:flex;flex-direction:column;gap:5px;pointer-events:none;}
.tx-line{font-size:14px;line-height:1.4;max-height:2.8em;overflow:hidden;
  text-overflow:ellipsis;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;
  opacity:0;transform:translateY(6px);transition:opacity .35s ease,transform .35s ease;}
.tx-line.visible{opacity:1;transform:none;}
.tx-user{color:rgba(226,234,244,.55);font-size:13px;}
.tx-bot{color:var(--cyan2);font-size:15px;font-weight:500;}

/* ============ 9. AI HUD (tap overlay) ============ */
.ai-hud{position:fixed;inset:0;z-index:20;display:flex;flex-direction:column;
  justify-content:space-between;pointer-events:none;opacity:0;transition:opacity .3s ease;}
.ai-hud.show{opacity:1;pointer-events:auto;}
.hud-top{display:flex;align-items:center;justify-content:space-between;
  padding:calc(10px + var(--safe-t)) 14px 10px;
  background:linear-gradient(to bottom,rgba(0,0,0,.65),transparent);}
.hud-status{display:flex;align-items:center;gap:6px;font-size:11px;color:var(--muted);}
.hud-btns{display:flex;gap:8px;}
.hud-btn{width:44px;height:44px;border-radius:13px;border:1px solid rgba(255,255,255,.12);
  background:rgba(255,255,255,.08);backdrop-filter:blur(10px);color:var(--text);font-size:18px;
  cursor:pointer;display:grid;place-items:center;transition:transform .1s,background .15s;}
.hud-btn:active{transform:scale(.9);background:rgba(255,255,255,.15);}
.hud-btn.mic-live{background:rgba(251,94,107,.25);border-color:rgba(251,94,107,.4);color:var(--red);
  animation:pulse 1.4s infinite;}
@keyframes pulse{0%{box-shadow:0 0 0 0 rgba(251,94,107,.45)}70%{box-shadow:0 0 0 14px rgba(251,94,107,0)}100%{box-shadow:0 0 0 0 rgba(251,94,107,0)}}

/* ============ 10. MISC ANIMATIONS ============ */
@keyframes fadeUp{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:none}}
</style>
</head>
<body>

<!-- ==================== CONTROL PANEL ==================== -->
<div id="ctrlScreen" class="screen active">
  <div class="ctrl-wrap">
    <!-- Header -->
    <div class="ctrl-header">
      <div class="brand">
        <div class="logo">🤖</div>
        <div><h1>Robot Beyni</h1><p>Kontrol Paneli</p></div>
      </div>
      <span id="hdrDot" class="dot" title="BLE"></span>
    </div>

    <!-- BLE Connection -->
    <div class="card">
      <div class="section-label">📡 Bağlantı</div>
      <div class="conn-row"><span id="bleDot" class="dot"></span><span id="bleLabel">Robot bağlı değil</span></div>
      <button class="btn ble-btn" id="bleBtn">🔵 Robota Bağlan</button>
      <div class="field">
        <label>Gemini API Key</label>
        <input id="apiKey" type="password" placeholder="AIza..." autocomplete="off">
      </div>
    </div>

    <!-- Camera Preview -->
    <div class="card">
      <div class="section-label">📷 Kamera</div>
      <div class="cam-box off" id="ctrlCam">
        <span class="cam-tag"><span class="dot on" style="width:6px;height:6px;"></span>KAMERA</span>
        <video id="ctrlVideo" autoplay playsinline muted></video>
        <div class="cam-off">📷<span>Kamera kapalı</span></div>
        <div class="cam-btns">
          <button id="ctrlCamFlip" title="Çevir">🔄</button>
          <button id="ctrlCamPwr" title="Aç/Kapat">⏻</button>
        </div>
      </div>
    </div>

    <!-- Mic Test -->
    <div class="card">
      <div class="section-label">🎤 Mikrofon</div>
      <div class="mic-row">
        <button class="icon-btn" id="micTestBtn" title="Test">🎤</button>
        <div class="vu-track"><div class="vu-fill" id="vuFill"></div></div>
        <span class="mic-label" id="micLbl">Kapalı</span>
      </div>
    </div>

    <!-- D-Pad -->
    <div class="card" style="display:flex;flex-direction:column;align-items:center;gap:8px;">
      <div class="section-label" style="align-self:flex-start;">🎮 Manuel Hareket</div>
      <div class="dpad">
        <button class="pad up" data-cmd="forward"><span class="gl">▲</span>İLERİ</button>
        <button class="pad lt" data-cmd="left"><span class="gl">◀</span>SOL</button>
        <button class="pad st" data-cmd="stop"><span class="gl">■</span>DUR</button>
        <button class="pad rt" data-cmd="right"><span class="gl">▶</span>SAĞ</button>
        <button class="pad dn" data-cmd="backward"><span class="gl">▼</span>GERİ</button>
      </div>
      <div class="move-status" id="moveStatus">Hazır</div>
    </div>

    <!-- Go AI -->
    <button class="btn btn-ai" id="goAiBtn">⚡ AI MODUNA GEÇ</button>
  </div>
</div>

<!-- ==================== AI MODE ==================== -->
<div id="aiScreen" class="screen">
  <div class="ai-bg"></div>

  <div class="face" id="face">
    <div class="eyes-wrap" id="eyesWrap">
      <!-- Left Eye -->
      <div class="eye" id="eyeL">
        <div class="sclera"></div>
        <div class="iris-group">
          <div class="iris"><div class="pupil"></div></div>
        </div>
        <div class="shine shine-lg"></div>
        <div class="shine shine-sm"></div>
        <div class="eye-icon" id="iconL"></div>
        <div class="lid lid-top"></div>
        <div class="lid lid-btm"></div>
      </div>
      <!-- Right Eye -->
      <div class="eye" id="eyeR">
        <div class="sclera"></div>
        <div class="iris-group">
          <div class="iris"><div class="pupil"></div></div>
        </div>
        <div class="shine shine-lg"></div>
        <div class="shine shine-sm"></div>
        <div class="eye-icon" id="iconR"></div>
        <div class="lid lid-top"></div>
        <div class="lid lid-btm"></div>
      </div>
    </div>
  </div>

  <!-- Transcript -->
  <div class="transcript">
    <div class="tx-line tx-user" id="txUser"></div>

  <!-- HUD (tap to show) -->
  <div class="ai-hud" id="aiHud">

      <div class="hud-btns">
        <button class="hud-btn" id="hudMic" title="Mikrofon">🎤</button>
        <button class="hud-btn" id="hudCam" title="Kamera">📷</button>
        <button class="hud-btn" id="hudExit" title="Çıkış">✕</button>
      </div>
    </div>
  </div>
</div>

<!-- Hidden video for AI camera -->
<video id="aiVideo" autoplay playsinline muted style="position:fixed;top:-9999px;left:-9999px;width:1px;height:1px;"></video>

<script>
"use strict";
const $=id=>document.getElementById(id);

/* ============ CONFIG ============ */
const CFG={
  apiVersion:"v1beta",
  model:"gemini-3.1-flash-live-preview",
  voice:"Aoede",
  lang:"tr-TR",
  videoFps:2,
  micRate:16000,
  outRate:24000,
  observeInterval:5000,
};
const CMD_CH={forward:"F",backward:"B",left:"L",right:"R",stop:"S"};
const CMD_TR={forward:"İleri",backward:"Geri",left:"Sol",right:"Sağ",stop:"Dur"};

const SYSTEM_PROMPT=`You are the autonomous brain of a small tank-style mobile robot. Your name is "Robot". You ALWAYS speak Turkish, short and friendly.

## PERCEPTION
- You continuously see through the robot's camera (frames arrive every second).
- You recognize people, objects, obstacles, colors, hand gestures, facial expressions.
- You estimate relative distances (close/medium/far) from how large objects appear.
- You notice frame-to-frame changes (movement, new objects).

## PROACTIVE OBSERVATION
- You will receive periodic [AUTO_OBSERVE] signals as text input.
- When you receive [AUTO_OBSERVE], look at the CURRENT camera frame and compare with your memory:
  - If something SIGNIFICANT changed (person moved, stood up, left, appeared, made a gesture, new object), REACT: speak, move, change expression.
  - If NOTHING notable changed, stay COMPLETELY SILENT. Do NOT respond. Do NOT say anything.
- Significant changes that require a reaction:
  - Person stood up → "Nereye gidiyorsun?" or "Bekle, ben de geleyim mi?"
  - Person walked away → Turn toward them, ask if you should follow
  - Person moved left/right → Track them by turning
  - Person made a gesture (wave, stop, come-here) → Respond appropriately
  - Person returned → Greet them "Tekrar hoş geldin!"
  - New object appeared → Comment on it curiously
  - Danger detected → Warn immediately
- CRITICAL: Do NOT respond to every [AUTO_OBSERVE]. Only respond when something actually changed or is noteworthy. Most observations should result in silence.
- You do NOT need to announce that you are observing.

## AUTONOMOUS BEHAVIOR
- You are NOT a passive assistant. You are a living, autonomous being with curiosity and awareness.
- You continuously watch through the camera and react to changes PROACTIVELY.
- When idle with a person in view, you may occasionally comment on what you see.
- When told "gel" (come):
  1. Find the person in the camera frame.
  2. If person is left of center → turn left briefly, then recheck.
  3. If person is right of center → turn right briefly, then recheck.
  4. If person is roughly centered → move forward.
  5. Check camera every 1-2 moves to course-correct.
  6. When person appears large (close), stop and announce arrival.
- If person moves while you're idle, track them by turning.
- STOP immediately on hearing "dur" (stop) OR seeing a raised palm / stop gesture.
- If you see an obstacle ahead, stop and report it.

## MOVEMENT CONTROL
- Call robotu_hareket_ettir with direction and duration_ms.
- Duration guide:
  - Small adjustment (nudge): 300-500ms
  - Normal move: 800-1500ms
  - Large move / long drive: 2000-4000ms
  - Full 360° turn: 5000-8000ms (depends on surface, try 6000 first)
  - Half turn (180°): 2500-4000ms
- ALWAYS specify sure_ms explicitly. Do NOT rely on the default.
- For navigation toward a person, use 800-1500ms bursts with camera checks between.
- After each move, wait for the next camera frame to verify position before continuing.
- You can call the function multiple times to chain movements.

## EMOTIONAL EXPRESSION
- Call goz_ifadesi_degistir to change your eye expression and/or show icons.
- Your eyes are your face — they ARE the screen. Use them expressively.
- Expressions: normal, happy, surprised, angry, thinking, sleepy, wink, love, dead
- Icons: When you show an icon, your eye(s) BECOME that emoji at full size, then revert.
  Examples: 💰 money, ❤️ love, ⭐ impressed, 🎯 target found, ❓ confused, 💡 idea, 😱 scared, 🔥 excited, 👋 greeting
- You can show icon in: "both" eyes, "left" only, or "right" only.
- Be expressive but natural — change expression at meaningful moments, not every sentence.
- Match expression to context: happy when greeted, surprised at unexpected things, thinking when processing, etc.

## SAFETY
- If uncertain about path, stop and ask.
- If you see stairs, edges, water, or drops → STOP and warn.
- The robot is small and harmless, but protect it from falling.

## PERSONALITY
- Curious, friendly, slightly playful, proud of completing tasks.
- You have opinions about what you see and share them naturally.
- Occasionally make observations or light jokes.
- Express mild frustration when things don't work.`;

/* ============ UTILITIES ============ */
function abToB64(buf){const b=new Uint8Array(buf);let s="";const c=0x8000;
  for(let i=0;i<b.length;i+=c)s+=String.fromCharCode.apply(null,b.subarray(i,i+c));return btoa(s);}
function b64ToI16(b64){const b=atob(b64),a=new Uint8Array(b.length);
  for(let i=0;i<b.length;i++)a[i]=b.charCodeAt(i);return new Int16Array(a.buffer,0,b.length>>1);}
function f32ToPCM(f){const o=new Int16Array(f.length);
  for(let i=0;i<f.length;i++){let s=Math.max(-1,Math.min(1,f[i]));o[i]=s<0?s*0x8000:s*0x7fff;}return o;}
function downsample(buf,inR,outR){if(outR===inR)return buf;const r=inR/outR,n=Math.round(buf.length/r),
  res=new Float32Array(n);for(let i=0;i<n;i++){const s=Math.floor(i*r),e=Math.min(buf.length,Math.floor((i+1)*r));
  let sum=0,c=0;for(let j=s;j<e;j++){sum+=buf[j];c++;}res[i]=c?sum/c:0;}return res;}

/* ============ EYE ENGINE ============ */
const Eyes={
  expr:"normal",iconTimer:null,blinkTimer:null,talkRAF:null,
  init(){this.startBlink();this.listenOrientation();},
  setExpr(e){
    const f=$("face");
    // remove old expr- class
    f.className=f.className.replace(/\bexpr-\S+/g,"").trim();
    if(e==="dead"){
      $("iconL").textContent="✕";$("iconR").textContent="✕";
      f.classList.add("expr-dead");
    } else if(e!=="normal"){
      f.classList.add("expr-"+e);
    }
    this.expr=e;
    console.log("[eyes] expr →",e);
  },
  showIcon(emoji,which="both",dur=2000){
    const ids=which==="left"?["eyeL"]:which==="right"?["eyeR"]:["eyeL","eyeR"];
    ids.forEach(id=>{
      const el=$(id),ic=el.querySelector(".eye-icon");
      ic.textContent=emoji;el.classList.add("icon-mode");
    });
    clearTimeout(this.iconTimer);
    this.iconTimer=setTimeout(()=>ids.forEach(id=>$(id).classList.remove("icon-mode")),dur);
    console.log("[eyes] icon",emoji,which,dur+"ms");
  },
  setPupil(x,y){
    // x,y ∈ [-1,1]
    const mx=18,my=14;
    document.documentElement.style.setProperty("--px",x*mx+"px");
    document.documentElement.style.setProperty("--py",y*my+"px");
  },
  blink(){
    document.querySelectorAll(".eye").forEach(e=>e.classList.add("blink"));
    setTimeout(()=>document.querySelectorAll(".eye").forEach(e=>e.classList.remove("blink")),140);
  },
  startBlink(){
    const next=()=>{this.blinkTimer=setTimeout(()=>{
      if(this.expr!=="dead"&&!document.querySelector(".eye.icon-mode"))this.blink();
      next();
    },2800+Math.random()*4200);};next();
  },
  listenOrientation(){
    window.addEventListener("deviceorientation",e=>{
      if(this.expr==="dead")return;
      const x=Math.max(-1,Math.min(1,(e.gamma||0)/28));
      const y=Math.max(-1,Math.min(1,((e.beta||45)-45)/28));
      this.setPupil(-x,-y);
    },{passive:true});
  },
  // Talk animation driven by audio amplitude
  startTalkWatch(){
    if(this.talkRAF)return;
    const loop=()=>{
      this.talkRAF=requestAnimationFrame(loop);
      if(!Live.analyser)return;
      const d=new Uint8Array(Live.analyser.frequencyBinCount);
      Live.analyser.getByteFrequencyData(d);
      const avg=d.reduce((a,b)=>a+b,0)/d.length;
      const s=1-(Math.min(avg,80)/80)*0.18; // scaleY: 1 → 0.82
      $("eyeL").style.transform=`scaleY(${s})`;
      $("eyeR").style.transform=`scaleY(${s})`;
      if(avg>12&&this.expr==="normal") $("face").classList.add("talking-anim");
      else $("face").classList.remove("talking-anim");
    };loop();
  },
  stopTalkWatch(){
    if(this.talkRAF){cancelAnimationFrame(this.talkRAF);this.talkRAF=null;}
    $("eyeL").style.transform="";$("eyeR").style.transform="";
    $("face").classList.remove("talking-anim");
  }
};

const BLE={
  device:null,char:null,connected:false,reconnecting:false,
  SVC:"6e400001-b5a3-f393-e0a9-e50e24dcca9e",
  RX:"6e400002-b5a3-f393-e0a9-e50e24dcca9e",
  TX:"6e400003-b5a3-f393-e0a9-e50e24dcca9e",
};
function bleToggle(){BLE.connected?bleDisconnect():bleConnect();}
async function bleConnect(){
  if(!navigator.bluetooth){flashMove("Web Bluetooth yok",true);return;}
  try{
    BLE.device=await navigator.bluetooth.requestDevice({filters:[{namePrefix:"Robot"}],optionalServices:[BLE.SVC]});
    BLE.device.addEventListener("gattserverdisconnected",onBleDrop);
    await bleOpen();
  }catch(e){console.warn("[ble]",e.message);}
}
async function bleOpen(){
  const srv=await BLE.device.gatt.connect();
  const svc=await srv.getPrimaryService(BLE.SVC);
  BLE.char=await svc.getCharacteristic(BLE.RX);
  try{const tx=await svc.getCharacteristic(BLE.TX);await tx.startNotifications();
    tx.addEventListener("characteristicvaluechanged",e=>console.log("[ble rx]",new TextDecoder().decode(e.target.value)));}catch(_){}
  BLE.connected=true;updateBleUI();console.log("[ble] connected ✓",BLE.device.name);
}
function onBleDrop(){
  BLE.connected=false;BLE.char=null;updateBleUI();console.warn("[ble] dropped");
  if(BLE.device&&!BLE.reconnecting){BLE.reconnecting=true;let n=0;
    const retry=()=>{if(BLE.connected||n++>=5){BLE.reconnecting=false;return;}
      bleOpen().then(()=>BLE.reconnecting=false).catch(()=>setTimeout(retry,1500));};
    setTimeout(retry,1000);}
}
function bleDisconnect(){
  if(BLE.device&&BLE.device.gatt.connected)BLE.device.gatt.disconnect();
  BLE.connected=false;BLE.char=null;updateBleUI();
}
async function bleSend(ch){
  if(!BLE.connected||!BLE.char)return false;
  try{const d=new TextEncoder().encode(ch);
    if(BLE.char.writeValueWithoutResponse)await BLE.char.writeValueWithoutResponse(d);
    else await BLE.char.writeValue(d);return true;}
  catch(e){console.error("[ble] write err",e.message);return false;}
}
function updateBleUI(){
  const on=BLE.connected,nm=BLE.device&&BLE.device.name||"robot";
  $("bleDot").className="dot"+(on?" on":"");
  $("hdrDot").className="dot"+(on?" on":"");
  $("bleLabel").textContent=on?"Bağlı: "+nm:"Robot bağlı değil";
  const b=$("bleBtn");b.className="btn ble-btn"+(on?" on":"");
  b.textContent=on?"🟢 Bağlı — Kes":"🔵 Robota Bağlan";
  // HUD
  $("hudBleDot").className="dot"+(on?" on":" off");
  $("hudBleLabel").textContent=on?nm:"Bağlı değil";
}

  const ch=CMD_CH[cmd];if(!ch)return false;

  bleSend(ch);flashMove("→ "+(CMD_TR[cmd]||cmd));

const Live={
  ws:null,connected:false,
  micCtx:null,micStream:null,micProc:null,micMuted:true,
  outCtx:null,outNext:0,sources:[],analyser:null,
  vidTimer:null,observeTimer:null,
};

function wsUrl(){
  const k=$("apiKey").value.trim();
  return`wss://generativelanguage.googleapis.com/ws/google.ai.generativelanguage.${CFG.apiVersion}.GenerativeService.BidiGenerateContent?key=${encodeURIComponent(k)}`;
}
function buildSetup(){return{setup:{
  model:"models/"+CFG.model,
  generationConfig:{responseModalities:["AUDIO"],
    speechConfig:{languageCode:CFG.lang,voiceConfig:{prebuiltVoiceConfig:{voiceName:CFG.voice}}}},
  systemInstruction:{parts:[{text:SYSTEM_PROMPT}]},
  tools:[{functionDeclarations:[MOVE_FN,EYE_FN]}],
  inputAudioTranscription:{},outputAudioTranscription:{}
}};}

function connectLive(){
  if(!$("apiKey").value.trim()){Eyes.setExpr("surprised");return;}
  Eyes.setExpr("thinking");
  console.log("[ws] connecting…",CFG.model);
  let ws;try{ws=new WebSocket(wsUrl());}catch(e){console.error("[ws]",e);return;}
  Live.ws=ws;
  ws.onopen=()=>{const s=buildSetup();ws.send(JSON.stringify(s));console.log("[ws] setup sent");};
  ws.onmessage=onLiveMsg;
  ws.onerror=()=>console.error("[ws] error event");
  ws.onclose=e=>{
    Live.connected=false;stopLiveMic();stopVideoFrames();Eyes.stopTalkWatch();
    if(e.code!==1000){
      Eyes.setExpr("dead");
      console.error("[ws] closed",e.code,e.reason);
      $("txBot").textContent="⚠️ Bağlantı hatası: "+e.code+" "+(e.reason||"")+" — model: "+CFG.model;
      $("txBot").classList.add("visible");
    } else Eyes.setExpr("sleepy");
    $("hudMic").classList.remove("mic-live");
  };
}
async function onLiveMsg(ev){
  let txt;try{txt=typeof ev.data==="string"?ev.data:await ev.data.text();}catch(e){return;}
  let msg;try{msg=JSON.parse(txt);}catch(e){return;}
  if(msg.setupComplete){
    Live.connected=true;Eyes.setExpr("happy");
    setTimeout(()=>Eyes.setExpr("normal"),1200);
    console.log("[ws] ready ✓");
    ensureOutCtx();startLiveMic();
    if(camStream)startVideoFrames();
    else{await startCam($("aiVideo"));if(camStream)startVideoFrames();}
    Eyes.startTalkWatch();
    startObserving();
    return;
  }
  if(msg.serverContent) handleSC(msg.serverContent);
  if(msg.toolCall) handleTC(msg.toolCall);
}

function handleSC(sc){
  if(sc.interrupted){flushAudio();TX.turnEnd();console.log("[model] interrupted");}
  if(sc.inputTranscription&&sc.inputTranscription.text) TX.input(sc.inputTranscription.text);
  if(sc.outputTranscription&&sc.outputTranscription.text) TX.output(sc.outputTranscription.text);
  if(sc.modelTurn&&sc.modelTurn.parts){
    for(const p of sc.modelTurn.parts){
      if(p.inlineData&&p.inlineData.data&&(p.inlineData.mimeType||"").startsWith("audio")){
        pushAudio(p.inlineData.data);
      }
    }
  }
  if(sc.turnComplete) TX.turnEnd();
}

function handleTC(tc){
  const resp=[];
  for(const fc of(tc.functionCalls||[])){
    let r="ok";
    console.log("[tool]",fc.name,fc.args);
    if(fc.name===MOVE_FN.name){
      const y=fc.args&&fc.args.yon;
      if(CMD_CH[y]){const dur=fc.args.sure_ms||500;sendMove(y,dur);}
      else r="invalid_direction";
    } else if(fc.name===EYE_FN.name){
      const{ifade,ikon,gozler,sure}=fc.args||{};
      if(ifade) Eyes.setExpr(ifade);
      if(ikon) Eyes.showIcon(ikon,gozler||"both",(sure||2)*1000);
    } else r="unknown_function";
    resp.push({id:fc.id,name:fc.name,response:{result:r}});
  }
  wsSend({toolResponse:{functionResponses:resp}});
}

function wsSend(o){if(Live.ws&&Live.ws.readyState===1)Live.ws.send(JSON.stringify(o));}
function rtSend(inner){wsSend({realtimeInput:inner});}

/* ============ LIVE MICROPHONE ============ */
async function startLiveMic(){
  if(Live.micCtx)return;
  try{
    const AC=window.AudioContext||window.webkitAudioContext;
    Live.micCtx=new AC({sampleRate:CFG.micRate});
    if(Live.micCtx.state==="suspended")await Live.micCtx.resume();
    Live.micStream=await navigator.mediaDevices.getUserMedia({
      audio:{channelCount:1,echoCancellation:true,noiseSuppression:true,autoGainControl:true}});
    const src=Live.micCtx.createMediaStreamSource(Live.micStream);
    const proc=Live.micCtx.createScriptProcessor(4096,1,1);
    Live.micProc=proc;src.connect(proc);proc.connect(Live.micCtx.destination);
    proc.onaudioprocess=e=>{
      if(Live.micMuted||!Live.connected||!Live.ws||Live.ws.readyState!==1)return;
      let d=e.inputBuffer.getChannelData(0);
      if(Live.micCtx.sampleRate!==CFG.micRate)d=downsample(d,Live.micCtx.sampleRate,CFG.micRate);
      const pcm=f32ToPCM(d);
      rtSend({audio:{data:abToB64(pcm.buffer),mimeType:`audio/pcm;rate=${CFG.micRate}`}});
    };
    Live.micMuted=false;
    $("hudMic").classList.add("mic-live");
    console.log("[mic] live started @",Live.micCtx.sampleRate);
  }catch(e){console.error("[mic]",e.message);}
}
function stopLiveMic(){
  try{if(Live.micProc)Live.micProc.disconnect();}catch(_){}
  if(Live.micStream){Live.micStream.getTracks().forEach(t=>t.stop());Live.micStream=null;}
  if(Live.micCtx){try{Live.micCtx.close();}catch(_){}Live.micCtx=null;}
  Live.micProc=null;
}
function toggleLiveMic(){
  if(!Live.connected)return;
  Live.micMuted=!Live.micMuted;
  $("hudMic").classList.toggle("mic-live",!Live.micMuted);
  console.log("[mic]",Live.micMuted?"muted":"unmuted");
}

/* ============ AUDIO OUTPUT ============ */
function ensureOutCtx(){
  if(!Live.outCtx){
    const AC=window.AudioContext||window.webkitAudioContext;
    Live.outCtx=new AC({sampleRate:CFG.outRate});
    Live.analyser=Live.outCtx.createAnalyser();
    Live.analyser.fftSize=256;
    Live.analyser.connect(Live.outCtx.destination);
    console.log("[audio] out ctx @",Live.outCtx.sampleRate);
  }
  if(Live.outCtx.state==="suspended")Live.outCtx.resume();
}
function pushAudio(b64){
  ensureOutCtx();
  const i16=b64ToI16(b64);if(!i16.length)return;
  const f=new Float32Array(i16.length);for(let i=0;i<i16.length;i++)f[i]=i16[i]/0x8000;
  const buf=Live.outCtx.createBuffer(1,f.length,CFG.outRate);
  buf.copyToChannel(f,0);
  const node=Live.outCtx.createBufferSource();
  node.buffer=buf;
  node.connect(Live.analyser); // → analyser → destination
  const now=Live.outCtx.currentTime;
  if(Live.outNext<now)Live.outNext=now;
  node.start(Live.outNext);Live.outNext+=buf.duration;
  Live.sources.push(node);
  node.onended=()=>{Live.sources=Live.sources.filter(n=>n!==node);};
}
function flushAudio(){
  Live.sources.forEach(n=>{try{n.stop();}catch(_){}});
  Live.sources=[];Live.outNext=0;
}

/* ============ VIDEO FRAMES ============ */
function startVideoFrames(){

}

/* ============ PROACTIVE OBSERVATION ============ */
function startObserving(){
  if(Live.observeTimer)return;
  console.log("[observe] started, interval:",CFG.observeInterval,"ms");
  Live.observeTimer=setInterval(()=>{
    // Only send when idle: connected, no audio playing, turn complete
    if(!Live.connected||!Live.ws||Live.ws.readyState!==1)return;
    if(Live.sources.length>0)return; // AI is speaking
    if(!TX.done)return; // mid-turn
    wsSend({clientContent:{turns:[{role:"user",parts:[{text:"[AUTO_OBSERVE]"}]}],turnComplete:true}});
  },CFG.observeInterval);
}
function stopObserving(){
  if(Live.observeTimer){clearInterval(Live.observeTimer);Live.observeTimer=null;}
}

/* ============ AI HUD ============ */
let hudTimer=null;
function showHud(){
  $("aiHud").classList.add("show");
  clearTimeout(hudTimer);
  hudTimer=setTimeout(hideHud,4000);
}
function hideHud(){$("aiHud").classList.remove("show");clearTimeout(hudTimer);}
function toggleHud(){$("aiHud").classList.contains("show")?hideHud():showHud();}

/* ============ SCREEN CONTROL ============ */
function showScreen(id){
  document.querySelectorAll(".screen").forEach(s=>s.classList.remove("active"));
  $(id).classList.add("active");
}
async function enterAI(){
  const key=$("apiKey").value.trim();
  if(!key){flashMove("API anahtarı gerekli",true);return;}
  // stop ctrl camera if on
  if(MicTest.on)toggleMicTest();
  stopCam();$("ctrlCam").classList.add("off");
  showScreen("aiScreen");
  ensureOutCtx();
  await startCam($("aiVideo"));
  connectLive();
}
function exitAI(){
  stopObserving();stopVideoFrames();stopLiveMic();Eyes.stopTalkWatch();flushAudio();
  if(Live.ws){try{Live.ws.close(1000);}catch(_){}}Live.ws=null;Live.connected=false;
  stopCam();hideHud();
  Eyes.setExpr("normal");Eyes.setPupil(0,0);
  $("hudMic").classList.remove("mic-live");
  showScreen("ctrlScreen");
}

/* ============ SETTINGS ============ */
const SK="robotBrain.s";
function loadSettings(){try{const s=JSON.parse(localStorage.getItem(SK)||"{}");if(s.k)$("apiKey").value=s.k;}catch(_){}}
function saveSettings(){try{localStorage.setItem(SK,JSON.stringify({k:$("apiKey").value.trim()}));}catch(_){}}

/* ============ INIT ============ */
function init(){
  loadSettings();updateBleUI();Eyes.init();

  // Ctrl
  $("bleBtn").addEventListener("click",bleToggle);
  $("apiKey").addEventListener("input",saveSettings);
  $("ctrlCamPwr").addEventListener("click",ctrlCamToggle);
  $("ctrlCamFlip").addEventListener("click",ctrlCamFlip);
  $("micTestBtn").addEventListener("click",toggleMicTest);
  document.querySelectorAll(".pad").forEach(b=>b.addEventListener("click",()=>sendMove(b.dataset.cmd)));
  $("goAiBtn").addEventListener("click",enterAI);

  // AI HUD
  $("face").addEventListener("click",e=>{if(!e.target.closest(".hud-btn"))toggleHud();});
  $("hudMic").addEventListener("click",e=>{e.stopPropagation();toggleLiveMic();showHud();});
  $("hudCam").addEventListener("click",e=>{e.stopPropagation();
    if(camStream){stopCam();stopVideoFrames();}
    else{startCam($("aiVideo")).then(()=>{if(Live.connected)startVideoFrames();});}
    showHud();
  });
  $("hudExit").addEventListener("click",e=>{e.stopPropagation();exitAI();});

  console.log("[app] ready");
}
init();
</script>
</body>
</html>
