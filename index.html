<!DOCTYPE html>
<html>
<body>
    <button id="bleBtn" onclick="connectBLE()">🔵 Robota Bağlan (Bluetooth)</button>
    <div id="bleStatus">Bağlı değil</div>
    <div class="dpad">
        <button onclick="sendBLE('forward')">İLERİ</button>
        <button onclick="sendBLE('stop')">DUR</button>
    </div>
    <script>
        let bleCharacteristic;
        async function connectBLE() {
            const device = await navigator.bluetooth.requestDevice({
                filters: [{ name: 'RobotBeyin' }],
                optionalServices: ['6e400001-b5a3-f393-e0a9-e50e24dcca9e']
            });
            const server = await device.gatt.connect();
            const service = await server.getPrimaryService('6e400001-b5a3-f393-e0a9-e50e24dcca9e');
            bleCharacteristic = await service.getCharacteristic('6e400002-b5a3-f393-e0a9-e50e24dcca9e');
            document.getElementById('bleStatus').textContent = "✓ BAĞLI";
        }
        async function sendBLE(cmd) {
            const map = { "forward":"F", "backward":"B", "left":"L", "right":"R", "stop":"S" };
            if(bleCharacteristic) await bleCharacteristic.writeValue(new TextEncoder().encode(map[cmd]));
        }
    </script>
</body>
</html>
